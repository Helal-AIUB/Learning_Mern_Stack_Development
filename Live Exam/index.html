<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exam</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

button{
margin:10px;
padding:10px 20px;
border:none;
cursor:pointer;
font-size:16px;
}

button:hover{
transform: scale(1.2);
opacity:0.8;
}

.btn1{
background:#ff0000;
color:white;
border-radius:5px;
}

.btn2{
background:blue;
color:white;
border-radius:20px;
}

.btn3{
background:green;
color:white;
border:2px solid black;
}

.btn4{
background:orange;
color:white;
box-shadow:2px 2px 10px gray;
}

.btn5{
background:black;
color:white;
letter-spacing:2px;
}

.btn6{
background:purple;
color:white;
border-radius:50px;
}

.btn7{
background:white;
color:black;
border:2px solid black;
}

.btn8{
background:teal;
color:white;
padding:12px 30px;
}

.btn9{
background:gold;
color:black;
font-weight:bold;
}

.btn10{
background:gray;
color:white;
text-transform:uppercase;
}

</style>
</head>

<body class="bg-gray-100">

<nav class="bg-blue-500 text-white p-4">
<div class="container mx-auto flex justify-between items-center">

<h1 class="text-xl font-bold">MyWebsite</h1>

<ul class="hidden md:flex space-x-6">
<li><a href="#" class="hover:text-gray-300">Home</a></li>
<li><a href="#" class="hover:text-gray-300">About</a></li>
<li><a href="#" class="hover:text-gray-200">Services</a></li>
<li><a href="#" class="hover:text-gray-200">Contact</a></li>
</ul>

</div>
</nav>

<div class="container mx-auto p-8">

<h2 class="text-2xl font-bold mb-4">10 Raw CSS Buttons</h2>

<button class="btn1">Button 1</button> <br> <br>
<button class="btn2">Button 2</button> <br> <br>
<button class="btn3">Button 3</button> <br> <br>
<button class="btn4">Button 4</button> <br> <br>
<button class="btn5">Button 5</button> <br> <br>
<button class="btn6">Button 6</button> <br> <br>
<button class="btn7">Button 7</button> <br> <br>
<button class="btn8">Button 8</button> <br> <br>
<button class="btn9">Button 9</button> <br> <br>
<button class="btn10">Button 10</button> <br> <br>

</div>

<div class="container mx-auto p-8">

<h2 class="text-2xl font-bold mb-4">3 Tailwind Input Boxes</h2>

<label for=""> Enter Full Name :</label>
<input type="text"
placeholder="Enter your name"
class="w-1/4 p-3 mb-4 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
<br> <br>

 <label for=""> Enter Password :</label>
<input type="password"
placeholder="Enter your password"
class="w-1/4 p-3 border-b-4 border-purple-500 focus:outline-none">
<br> <br>

<label for="">  Enter E-Mail : </label>
<input type="email"
placeholder="Enter your email"
class="w-1/4 p-3 mb-4 border-2 border-green-500 rounded-full focus:outline-none">
<br> <br>

</div>

</body>
</html>
